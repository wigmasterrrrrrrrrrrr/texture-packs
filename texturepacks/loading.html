<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        .loader {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="loader">
        <h1>Loading...</h1>
        <p>Please wait</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const target = params.get("target");

        if (!target) {
            document.body.innerHTML = "<h1>No page specified.</h1>";
        } else {
            const preloadFrame = document.createElement("iframe");
            preloadFrame.style.display = "none";
            preloadFrame.src = target;

            preloadFrame.onload = () => {
                window.location.replace(target);
            };

            document.body.appendChild(preloadFrame);
        }
    </script>

</body>
</html>
